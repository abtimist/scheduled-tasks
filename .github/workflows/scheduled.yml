name: Daily Script
on:
  schedule:
    # ╔═══════════════════════════════════════════════════════════════╗
    # ║  CHANGE THE LINE BELOW to set when your script runs          ║
    # ║                                                                ║
    # ║  Format:  'MINUTE HOUR * * *'                                  ║
    # ║                                                                ║
    # ║  Examples:                                                     ║
    # ║    '0 9 * * *'   = 9:00 AM UTC daily                          ║
    # ║    '30 14 * * *' = 2:30 PM UTC daily                          ║
    # ║    '0 0 * * *'   = Midnight UTC daily                         ║
    # ║                                                                ║
    # ║  Use https://time.is/UTC to find your local time in UTC       ║
    # ╚═══════════════════════════════════════════════════════════════╝
    - cron: '0 1 * * *'
  # This adds a "Run workflow" button so you can test manually
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        run: |
          MISSING=0
          for var in OWM_API_KEY ACCOUNT_SID AUTH_TOKEN MSG_SERVICE_ID PHONE_NO; do
            if [ -z "${!var}" ]; then
              echo "❌ $var secret is not set! Go to Settings > Secrets > Actions and add it."
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          MSG_SERVICE_ID: ${{ secrets.MSG_SERVICE_ID }}
          PHONE_NO: ${{ secrets.PHONE_NO }}

      - name: Run script
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          MSG_SERVICE_ID: ${{ secrets.MSG_SERVICE_ID }}
          PHONE_NO: ${{ secrets.PHONE_NO }}
        run: python main.py
