name: Test Setup
on:
  workflow_dispatch:  # Manual trigger only
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          MSG_SERVICE_ID: ${{ secrets.MSG_SERVICE_ID }}
          PHONE_NO: ${{ secrets.PHONE_NO }}
        run: |
          MISSING=0
          for var in OWM_API_KEY ACCOUNT_SID AUTH_TOKEN MSG_SERVICE_ID PHONE_NO; do
            if [ -z "${!var}" ]; then
              echo "❌ $var secret is not set! Go to Settings > Secrets > Actions and add it."
              MISSING=1
            else
              echo "✅ $var is configured"
            fi
          done
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
          echo ""
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."
          if [ -f "main.py" ]; then
            echo "✅ main.py found"
          else
            echo "❌ main.py not found!"
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found"
          else
            echo "❌ requirements.txt not found!"
            exit 1
          fi
          echo ""
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "✅ Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
